<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Atlas - Login</title><link rel="icon" type="image/png" href="assets/fav.png"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/index.css"><link rel="stylesheet" href="style.css"></head><body><main class="login-container"><section class="login-left"><header class="logo-container"><img src="assets/logo-atlas.png" alt="Atlas Logo" id="logo-atlas" class="logo-image"></header><div class="form-container"><h1 class="welcome-title">Welcome back</h1><p class="signup-prompt">Don't have an account? <span class="accent-link" id="contactBrokerage">Contact Brokerage</span></p><form class="login-form" id="loginForm"><div class="input-group"><label for="emailInput" class="input-label">Email</label><input type="email" id="emailInput" placeholder="Your email" required class="text-input"></div><div class="input-group" id="passwordGroup" style="display:none"><label for="passwordInput" class="input-label">Password</label><div class="password-container"><input type="password" id="passwordInput" placeholder="Your password" class="text-input"><button type="button" id="passwordToggle" class="password-toggle" aria-label="Toggle password visibility"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button></div></div><div class="error-message" id="errorMessage" style="display:none"></div><button type="submit" id="loginButton" class="submit-button">Login</button></form><div class="alternative-login" id="magicLinkOption"><span class="accent-link" id="passwordLoginLink">Sign in with password instead.</span></div><div class="alternative-login-pwd" id="passwordViewOptions" style="display:none"><p class="forgot-prompt">Forgot your login details? <span class="accent-link" id="contactBrokeragePwd">Contact Brokerage</span></p><span class="accent-link" id="magicLinkLoginLink">Sign in with magic link.</span></div></div><script>const loginForm=document.getElementById('loginForm');const errorMessage=document.getElementById('errorMessage');const passwordLoginLink=document.getElementById('passwordLoginLink');const magicLinkLoginLink=document.getElementById('magicLinkLoginLink');const passwordGroup=document.getElementById('passwordGroup');const passwordInput=document.getElementById('passwordInput');const magicLinkOption=document.getElementById('magicLinkOption');const passwordViewOptions=document.getElementById('passwordViewOptions');const passwordToggle=document.getElementById('passwordToggle');const eyeOffIcon=`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;const eyeOnIcon=`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;function clearErrors(){errorMessage.style.display='none';errorMessage.textContent=''}passwordLoginLink.addEventListener('click',()=>{clearErrors();passwordGroup.style.display='flex';passwordInput.required=!0;magicLinkOption.style.display='none';passwordViewOptions.style.display='block'});magicLinkLoginLink.addEventListener('click',()=>{clearErrors();passwordGroup.style.display='none';passwordInput.required=!1;passwordInput.value='';magicLinkOption.style.display='block';passwordViewOptions.style.display='none'});passwordToggle.addEventListener('click',()=>{if(passwordInput.type==='password'){passwordInput.type='text';passwordToggle.innerHTML=eyeOnIcon}else{passwordInput.type='password';passwordToggle.innerHTML=eyeOffIcon}});loginForm.addEventListener('submit',e=>{e.preventDefault();const t=passwordGroup.style.display==='flex';errorMessage.textContent=t?'Wrong password or email':'Wrong email';errorMessage.style.display='block'});</script><footer class="login-footer"><span class="footer-text" id="footerText">Atlas Brokerage © 2026</span></footer></section><section class="login-right"><div class="hero-image-container"><img src="assets/hero-image.jpg" alt="Silhouette of person in sunset" id="hero-image" class="hero-image"></div></section></main></body></html>
